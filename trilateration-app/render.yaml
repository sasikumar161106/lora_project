services:
  - type: web
    name: trilateration-server
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trilateration-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: trilateration-db
    plan: free
